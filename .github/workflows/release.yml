name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: vimm-downloader
            asset_name: vimm-downloader-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: vimm-downloader
            asset_name: vimm-downloader-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: vimm-downloader
            asset_name: vimm-downloader-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: vimm-downloader.exe
            asset_name: vimm-downloader-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p vimm-cli
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ${{ github.ref_name }} --yes 2>/dev/null || true
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/vimm-downloader-linux-amd64/vimm-downloader \
            artifacts/vimm-downloader-macos-arm64/vimm-downloader \
            artifacts/vimm-downloader-macos-amd64/vimm-downloader \
            artifacts/vimm-downloader-windows-amd64.exe/vimm-downloader.exe
