name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: vimm-downloader
            asset_name: vimm-downloader-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: vimm-downloader
            asset_name: vimm-downloader-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: vimm-downloader.exe
            asset_name: vimm-downloader-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p vimm-cli
      - name: Prepare release asset
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset_name }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" --clobber \
            artifacts/vimm-downloader-linux-amd64 \
            artifacts/vimm-downloader-macos-arm64 \
            artifacts/vimm-downloader-windows-amd64.exe
